name: Wyoming Parakeet (Intel NPU)
version: "1.5.0"
slug: wyoming_parakeet_npu
description: Parakeet TDT 0.6B v3 speech-to-text on Intel NPU (Wyoming protocol)
url: https://github.com/ganiushin/parakeet-stt-silero-tts-addons-haos
arch:
  - amd64
init: false
startup: application
boot: auto
hassio_api: true
discovery:
  - wyoming
ports:
  10300/tcp: 10300
ports_description:
  10300/tcp: Wyoming protocol server
devices:
  - /dev/accel/accel0
options:
  language: ru
  force_language: true
  device: NPU
  encoder_buckets: "10"
  encoder_lazy_buckets: ""
schema:
  language: list(bg|hr|cs|da|nl|en|et|fi|fr|de|el|hu|it|lv|lt|mt|pl|pt|ro|ru|sk|sl|es|sv|uk)
  force_language: bool
  device: list(NPU|GPU|CPU)
  encoder_buckets: str
  encoder_lazy_buckets: str
